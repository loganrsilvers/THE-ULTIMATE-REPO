<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lady LOGAN</title>

<style>

@font-face {
    font-family: 'Ladybug';
    src: url('Ladybirds.ttf') format('truetype');
}

header {
    width: 100%;
    background: #222;
    color: rgb(68, 200, 61);
    text-align: center;
    padding: 15px;
    font-size: 100px;
    font-weight: bold;
    font-family: 'Ladybug', sans-serif;
}



/* PAGE */
body {
    background: #f0f0f0;
    margin: 0;
}

/* Container */
.figure {
    position: relative;
    width: 200px;
    height: 400px;
    margin: 100px auto 0 auto;
}

/* Hair */
.hair {
    position: absolute;
    width: 140px;
    height: 220px;
    background: red;
    border-radius: 70% 70% 60% 60%;
    top: -20px;
    left: 30px;
    z-index: 1;
    cursor: pointer;
    transition: background 0.9s ease;
}

/* Head */
.head {
    position: absolute;
    width: 100px;
    height: 120px;
    background: #f2c7a5;
    border-radius: 60% 60% 50% 50%;
    top: 40px;
    left: 50px;
    z-index: 2;
}

/* Eyes */
.eye {
    position: absolute;
    width: 10px;
    height: 10px;
    background: black;
    border-radius: 50%;
    top: 45px;
}
.eye.left { left: 25px; }
.eye.right { right: 25px; }

/* Mouth */
.mouth {
    position: absolute;
    width: 30px;
    height: 15px;
    border-bottom: 6px solid black;
    border-radius: 50%;
    bottom: 25px;
    left: 35px;
}

/* Body */
.body {
    position: absolute;
    width: 120px;
    height: 160px;
    background-image: url('lob.jpg');
    background-position: -50px center;
    border-radius: 60% 60% 30% 30%;
    top: 150px;
    left: 40px;
}

/* Arms */
.arm {
    position: absolute;
    width: 20px;
    height: 100px;
    background: #f2c7a5;
    top: 160px;
}
.arm.left {
    left: 10px;
    transform: rotate(20deg);
}
.arm.right {
    right: 10px;
    transform: rotate(-20deg);
}

/* Legs */
.leg {
    position: absolute;
    width: 25px;
    height: 100px;
    background: #333;
    bottom: 0;
}
.leg.left { left: 60px; }
.leg.right { right: 60px; }

</style>
</head>

<body>

<header>
    Logan is Queen
</header>

<div class="figure">

    <div class="hair" onclick="changeHair()"></div>

    <div class="head">
        <div class="eye left"></div>
        <div class="eye right"></div>
        <div class="mouth"></div>
    </div>

    <div class="body"></div>

    <div class="arm left"></div>
    <div class="arm right"></div>

    <div class="leg left"></div>
    <div class="leg right"></div>

</div>

<script>
let colors = ["red", "blue", "green", "purple"];
let index = 0;

function changeHair() {
    index = (index + 1) % colors.length;
    document.querySelector(".hair").style.background = colors[index];
}
</script>

<a href="logan.html" class="link-box">Go to Logan</a>


</body>
</html>
